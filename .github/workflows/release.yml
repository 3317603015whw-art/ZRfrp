name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish desktop as a self-contained single file
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          dotnet publish FrpDesktop/FrpDesktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish/desktop
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $packageDirectory = "release/desktop"
          New-Item -ItemType Directory -Force -Path $packageDirectory | Out-Null
          Copy-Item "publish/desktop/ZRfrp.exe" $packageDirectory
          $archive = "release/ZRfrp-Desktop-v$version-win-x64.zip"
          Compress-Archive -Path "$packageDirectory/ZRfrp.exe" -DestinationPath $archive

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path $archive))
          try {
            $entries = @($zip.Entries | Where-Object { $_.FullName -notlike "*/" })
            if ($entries.Count -ne 1 -or $entries[0].FullName -ne "ZRfrp.exe") {
              throw "Desktop archive must contain only ZRfrp.exe at its root."
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload desktop package
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop
          path: release/*.zip
          if-no-files-found: error

  server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish server
        run: |
          dotnet publish ZRfrp.Server/ZRfrp.Server.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "publish/${{ matrix.rid }}"
          tar -C "publish/${{ matrix.rid }}" -czf "zrfrp-server-${{ matrix.rid }}.tar.gz" .

      - name: Upload server package
        uses: actions/upload-artifact@v4
        with:
          name: release-server-${{ matrix.rid }}
          path: zrfrp-server-${{ matrix.rid }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [desktop, server]

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --repo "${{ github.repository }}" \
            --title "ZRfrp ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
